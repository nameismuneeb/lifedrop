<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team APEX</title>

    <!-- Preconnect for faster Google Fonts load -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
      /* ── Reset ── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ── Base ── */
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #080818;
        /* Vertical padding keeps content clear of viewport edges on all sizes */
        padding: 2.5rem 1.25rem;
        /* Prevent horizontal scroll at the root level */
        overflow-x: hidden;
      }

      /* ── Background scene (fixed, non-interactive) ── */
      .scene {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        /* Clip orbs that bleed past the viewport */
        overflow: hidden;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
      }

      .orb-1 {
        width: 600px;
        height: 600px;
        top: -140px;
        left: 50px;
        background: radial-gradient(circle,
            rgba(110, 66, 193, 0.60) 0%,
            rgba(76, 29, 149, 0.3) 50%,
            transparent 75%);
      }

      .orb-2 {
        width: 480px;
        height: 480px;
        bottom: -120px;
        left: -120px;
        background: radial-gradient(circle,
            rgba(220, 38, 127, 0.55) 0%,
            rgba(157, 23, 77, 0.28) 50%,
            transparent 75%);
      }

      .orb-3 {
        width: 360px;
        height: 360px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(56, 189, 248, 0.18) 0%, rgba(14, 165, 233, 0.07) 50%, transparent 75%);
      }

      .orb-4 {
        width: 300px;
        height: 300px;
        bottom: 5%;
        left: 10%;
        background: radial-gradient(circle, rgba(52, 211, 153, 0.18) 0%, transparent 70%);
      }

      .orb-5 {
        width: 300px;
        height: 300px;
        top: -140px;
        right: 40px;
        background: radial-gradient(circle,
            rgba(138, 92, 246, 0.45) 0%,
            rgba(138, 92, 246, 0.18) 45%,
            transparent 75%);
      }

      /* Subtle dot grid overlay */
      .dot-grid {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      }

      /* Decorative geometric outlines */
      .geo {
        position: absolute;
        border: 1px solid;
      }

      .geo-1 {
        width: 180px;
        height: 180px;
        top: 8%;
        right: 12%;
        border-color: rgba(167, 139, 250, 0.16);
        border-radius: 24px;
        transform: rotate(22deg);
        background: rgba(139, 92, 246, 0.04);
      }

      .geo-2 {
        width: 110px;
        height: 110px;
        bottom: 15%;
        left: 8%;
        border-color: rgba(244, 114, 182, 0.14);
        border-radius: 50%;
        background: rgba(236, 72, 153, 0.04);
      }

      .geo-3 {
        width: 70px;
        height: 70px;
        top: 22%;
        left: 14%;
        border-color: rgba(125, 211, 252, 0.16);
        border-radius: 12px;
        transform: rotate(-14deg);
      }

      .geo-4 {
        width: 140px;
        height: 140px;
        bottom: 12%;
        right: 9%;
        border-color: rgba(110, 231, 183, 0.13);
        border-radius: 20px;
        transform: rotate(38deg);
      }

      .geo-5 {
        width: 50px;
        height: 50px;
        top: 60%;
        right: 18%;
        border-color: rgba(251, 191, 36, 0.13);
        border-radius: 8px;
        transform: rotate(20deg);
      }

      /* ── Page layout ── */
      .content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        width: 100%;
        max-width: 560px;
      }

      /* ── Main glass card ── */
      .glass-card {
        width: 100%;
        background: linear-gradient(135deg,
            rgba(255, 255, 255, 0.10) 0%,
            rgba(255, 255, 255, 0.04) 40%,
            rgba(139, 92, 246, 0.06) 70%,
            rgba(236, 72, 153, 0.06) 100%);
        backdrop-filter: blur(40px) saturate(160%);
        -webkit-backdrop-filter: blur(40px) saturate(160%);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        box-shadow:
          0 0 0 1px rgba(139, 92, 246, 0.12),
          0 1px 0 rgba(255, 255, 255, 0.16) inset,
          0 -1px 0 rgba(0, 0, 0, 0.3) inset,
          0 32px 80px rgba(0, 0, 0, 0.5),
          0 12px 32px rgba(0, 0, 0, 0.3);
        /* Responsive padding: generous on desktop, tighter on mobile */
        padding: 3rem 3rem 2.5rem;
        position: relative;
        overflow: hidden;
      }

      /* Top edge shimmer */
      .glass-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 10%;
        right: 10%;
        height: 1px;
        background: linear-gradient(90deg,
            transparent,
            rgba(255, 255, 255, 0.5) 30%,
            rgba(200, 180, 255, 0.6) 50%,
            rgba(255, 255, 255, 0.5) 70%,
            transparent);
      }

      /* Inner highlight gradient */
      .glass-card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 45%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.052) 0%, transparent 100%);
        border-radius: 28px 28px 0 0;
        pointer-events: none;
      }

      .card-inner {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── Typography ── */
      .eyebrow {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(196, 181, 253, 0.6);
        margin-bottom: 14px;
        /* Prevent long text from breaking layout */
        text-align: center;
      }

      .center-title {
        font-size: 3rem;
        font-weight: 300;
        letter-spacing: -0.03em;
        line-height: 1;
        margin-bottom: 2rem;
        text-align: center;
        background: linear-gradient(135deg, #ffffff 0%, #e0d7ff 30%, #c4b5fd 55%, #f9a8d4 80%, #ffffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .divider {
        width: 48px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(196, 181, 253, 0.5), rgba(249, 168, 212, 0.5), transparent);
        margin-bottom: 2rem;
      }

      /* ── CTA Button ── */
      .glass-btn {
        position: relative;
        width: 100%;
        max-width: 310px;
        height: 72px;
        border-radius: 999px;
        text-decoration: none;
        background: linear-gradient(135deg,
            rgba(255, 255, 255, 0.13) 0%,
            rgba(255, 255, 255, 0.05) 50%,
            rgba(139, 92, 246, 0.1) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.2) inset,
          0 -1px 0 rgba(0, 0, 0, 0.25) inset,
          0 0 0 1px rgba(139, 92, 246, 0.1),
          0 12px 32px rgba(0, 0, 0, 0.35);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 10px 0 28px;
        overflow: hidden;
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.3s ease;
        cursor: pointer;
      }

      .glass-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.03) 100%);
        border-radius: 999px 999px 40% 40%;
        pointer-events: none;
      }

      .glass-btn::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(236, 72, 153, 0.1) 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .glass-btn:hover::after {
        opacity: 1;
      }

      .glass-btn:hover {
        transform: translateY(-4px);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.25) inset,
          0 0 0 1px rgba(167, 139, 250, 0.3),
          0 0 32px rgba(139, 92, 246, 0.25),
          0 20px 48px rgba(0, 0, 0, 0.45);
      }

      .glass-btn:active {
        transform: translateY(1px);
        transition-duration: 0.1s;
      }

      /* Keyboard focus indicator for accessibility */
      .glass-btn:focus-visible {
        outline: 2px solid rgba(167, 139, 250, 0.7);
        outline-offset: 3px;
      }

      .btn-text {
        position: relative;
        z-index: 3;
        color: rgba(255, 255, 255, 0.92);
        font-size: 1.05rem;
        font-weight: 500;
        letter-spacing: 0.01em;
      }

      .btn-hint {
        font-size: 0.75rem;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.45);
      }

      .icon {
        position: relative;
        z-index: 3;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.45rem;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(139, 92, 246, 0.2) 100%);
        border: 1px solid rgba(255, 255, 255, 0.22);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.25) inset,
          0 4px 12px rgba(0, 0, 0, 0.3);
        /* Icon circle does not need its own transition — logo-icon handles it */
        flex-shrink: 0;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        object-fit: contain;
        display: block;
        /* Single, authoritative transition for the logo spin */
        transition: transform 2s ease-in-out;
      }

      .glass-btn:hover .logo-icon {
        transform: scale(1.15) rotate(360deg);
      }

      /* ── Member cards grid ── */
      .member-row {
        display: grid;
        /* Desktop: all 4 in one row */
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        width: 100%;
      }

      .member-card {
        position: relative;
        overflow: hidden;
        border-radius: 20px;
        padding: 1.25rem 0.9rem 1.1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.65rem;
        background: linear-gradient(155deg,
            rgba(255, 255, 255, 0.09) 0%,
            rgba(255, 255, 255, 0.03) 60%,
            rgba(0, 0, 0, 0.05) 100%);
        backdrop-filter: blur(32px) saturate(150%);
        -webkit-backdrop-filter: blur(32px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.11);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.14) inset,
          0 -1px 0 rgba(0, 0, 0, 0.2) inset,
          0 12px 32px rgba(0, 0, 0, 0.35),
          0 4px 10px rgba(0, 0, 0, 0.2);
        cursor: default;
        transition:
          transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1),
          box-shadow 0.35s ease,
          border-color 0.35s ease;
      }

      /* Top edge shimmer */
      .member-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 15%;
        right: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.45), transparent);
        transition: opacity 0.35s ease;
      }

      /* Per-card hover glow overlay */
      .member-card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.35s ease;
      }

      .member-card:nth-child(1)::after {
        background: linear-gradient(155deg, rgba(139, 92, 246, 0.18) 0%, rgba(109, 40, 217, 0.08) 100%);
      }

      .member-card:nth-child(2)::after {
        background: linear-gradient(155deg, rgba(236, 72, 153, 0.18) 0%, rgba(190, 24, 93, 0.08) 100%);
      }

      .member-card:nth-child(3)::after {
        background: linear-gradient(155deg, rgba(56, 189, 248, 0.18) 0%, rgba(14, 165, 233, 0.08) 100%);
      }

      .member-card:nth-child(4)::after {
        background: linear-gradient(155deg, rgba(52, 211, 153, 0.18) 0%, rgba(16, 185, 129, 0.08) 100%);
      }

      .member-card:hover {
        transform: translateY(-7px) scale(1.03);
        border-color: rgba(255, 255, 255, 0.22);
      }

      .member-card:nth-child(1):hover {
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.2) inset,
          0 0 0 1px rgba(167, 139, 250, 0.35),
          0 0 28px rgba(139, 92, 246, 0.3),
          0 24px 48px rgba(0, 0, 0, 0.45);
      }

      .member-card:nth-child(2):hover {
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.2) inset,
          0 0 0 1px rgba(249, 168, 212, 0.35),
          0 0 28px rgba(236, 72, 153, 0.28),
          0 24px 48px rgba(0, 0, 0, 0.45);
      }

      .member-card:nth-child(3):hover {
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.2) inset,
          0 0 0 1px rgba(125, 211, 252, 0.35),
          0 0 28px rgba(56, 189, 248, 0.28),
          0 24px 48px rgba(0, 0, 0, 0.45);
      }

      .member-card:nth-child(4):hover {
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.2) inset,
          0 0 0 1px rgba(110, 231, 183, 0.35),
          0 0 28px rgba(52, 211, 153, 0.28),
          0 24px 48px rgba(0, 0, 0, 0.45);
      }

      .member-card:hover::after {
        opacity: 1;
      }

      /* Card text elements */
      .member-label {
        position: relative;
        z-index: 2;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.35);
        transition: color 0.3s ease;
      }

      .member-card:hover .member-label {
        color: rgba(255, 255, 255, 0.55);
      }

      .member-name {
        position: relative;
        z-index: 2;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.01em;
        text-align: center;
        line-height: 1.3;
        transition: color 0.3s ease;
      }

      .member-card:nth-child(1) .member-name {
        color: #c4b5fd;
      }

      .member-card:nth-child(2) .member-name {
        color: #f9a8d4;
      }

      .member-card:nth-child(3) .member-name {
        color: #7dd3fc;
      }

      .member-card:nth-child(4) .member-name {
        color: #6ee7b7;
      }

      .member-tag {
        position: relative;
        z-index: 2;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.06em;
        padding: 3px 9px;
        border-radius: 999px;
        border: 1px solid;
        transition: all 0.3s ease;
      }

      .member-card:nth-child(1) .member-tag {
        color: rgba(196, 181, 253, 0.7);
        border-color: rgba(139, 92, 246, 0.3);
        background: rgba(139, 92, 246, 0.12);
      }

      .member-card:nth-child(2) .member-tag {
        color: rgba(249, 168, 212, 0.7);
        border-color: rgba(236, 72, 153, 0.3);
        background: rgba(236, 72, 153, 0.12);
      }

      .member-card:nth-child(3) .member-tag {
        color: rgba(125, 211, 252, 0.7);
        border-color: rgba(56, 189, 248, 0.3);
        background: rgba(56, 189, 248, 0.12);
      }

      .member-card:nth-child(4) .member-tag {
        color: rgba(110, 231, 183, 0.7);
        border-color: rgba(52, 211, 153, 0.3);
        background: rgba(52, 211, 153, 0.12);
      }

      .member-card:hover .member-tag {
        filter: brightness(1.25);
      }

      /* ────────────────────────────────────────────────
       Responsive breakpoints
    ──────────────────────────────────────────────── */

      /* Tablet: ≤ 768px */
      @media (max-width: 768px) {
        body {
          padding: 2rem 1rem;
        }

        .glass-card {
          /* Reduce horizontal padding so content never clips */
          padding: 2.25rem 1.75rem 2rem;
        }

        .center-title {
          font-size: 2.5rem;
        }

        /* 2×2 grid: members 1+2 top row, 3+4 bottom row */
        .member-row {
          grid-template-columns: repeat(2, 1fr);
        }

        /* Slightly tighter card hover on touch/tablet */
        .member-card:hover {
          transform: translateY(-5px) scale(1.02);
        }
      }

      /* Mobile: ≤ 480px */
      @media (max-width: 480px) {
        body {
          padding: 1.5rem 0.875rem;
        }

        .glass-card {
          padding: 2rem 1.25rem 1.75rem;
          border-radius: 22px;
        }

        .center-title {
          font-size: 2.1rem;
        }

        .glass-btn {
          /* Ensure button fits narrow screens */
          max-width: 100%;
          height: 64px;
          padding: 0 8px 0 20px;
        }

        .btn-text {
          font-size: 0.95rem;
        }

        /* Keep 2-column layout on mobile per requirements */
        .member-row {
          grid-template-columns: repeat(2, 1fr);
        }

        /* Reduce logo spin duration for snappier feel on mobile */
        .logo-icon {
          transition: transform 0.5s ease-in-out;
        }

        /* Subtle, non-jarring hover on small touch screens */
        .member-card:hover {
          transform: translateY(-4px) scale(1.01);
        }

        #member-card-3:hover,
        #member-card-4:hover {
          transform: translateY(-4px);
          box-shadow: none;
          border-color: rgba(255, 255, 255, 0.11);
        }

        #member-card-3:hover::after,
        #member-card-4:hover::after {
          opacity: 0;
        }
      }

      /* Very small screens: ≤ 360px */
      @media (max-width: 360px) {
        .member-row {
          gap: 8px;
        }

        .member-card {
          padding: 1rem 0.6rem 0.9rem;
        }

        .member-name {
          font-size: 0.75rem;
        }
      }

      /* Respect user preference for reduced motion */
      @media (prefers-reduced-motion: reduce) {

        .glass-btn,
        .glass-btn::after,
        .member-card,
        .member-card::after,
        .logo-icon {
          transition: none;
        }

        .glass-btn:hover {
          transform: none;
        }

        .glass-btn:hover .logo-icon {
          transform: none;
        }

        .member-card:hover {
          transform: none;
        }
      }

      @media (max-width: 480px) {

        /* Hide the extra right-side glow */
        .orb-5 {
          display: none;
        }

        /* Restore the original purple glow */
        .orb-1 {
          width: 520px;
          height: 520px;
          top: -140px;
          right: 90px;
          left: auto;
          background: radial-gradient(circle,
              rgba(111, 66, 193, 0.65) 0%,
              rgba(76, 29, 149, 0.3) 50%,
              transparent 75%);
        }
      }
    </style>
  </head>

  <body>

    <!-- Decorative background scene -->
    <div class="scene" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="orb orb-4"></div>
      <div class="orb orb-5"></div>
      <div class="dot-grid"></div>
      <div class="geo geo-1"></div>
      <div class="geo geo-2"></div>
      <div class="geo geo-3"></div>
      <div class="geo geo-4"></div>
      <div class="geo geo-5"></div>
    </div>

    <!-- Main content -->
    <div class="content">

      <!-- Hero glass card -->
      <div class="glass-card">
        <div class="card-inner">
          <p class="eyebrow">Superior University</p>
          <h1 class="center-title">Team Apex</h1>
          <div class="divider" role="presentation"></div>

          <!-- CTA link — opens in new tab with rel for security -->
          <a id="blooddrop-btn" href="LifeDrop/index.html" class="glass-btn" target="_blank"
            rel="noopener noreferrer" aria-label="Visit BloodDrop project website">
            <span class="btn-text">
              BloodDrop <span class="btn-hint">(click here)</span>
            </span>
            <span class="icon" aria-hidden="true">
              <img src="image/logo-white.png" alt="" class="logo-icon">
            </span>
          </a>
        </div>
      </div>

      <!-- Team member cards -->
      <div class="member-row" role="list" aria-label="Team members">

        <div class="member-card" role="listitem">
          <span class="member-label">Member 1</span>
          <span class="member-name">Muneeb Asif</span>
          <span class="member-tag">Lead &amp; Dev</span>
        </div>

        <div class="member-card" role="listitem">
          <span class="member-label">Member 2</span>
          <span class="member-name">Tuba Batool</span>
          <span class="member-tag">Dev &amp; Design</span>
        </div>

        <div class="member-card" id="member-card-3" role="listitem">
          <span class="member-label">Member 3</span>
          <span class="member-name">Raza</span>
          <span class="member-tag">Testing</span>
        </div>

        <div class="member-card" id="member-card-4" role="listitem">
          <span class="member-label">Member 4</span>
          <span class="member-name">Rabia</span>
          <span class="member-tag">Testing</span>
        </div>

      </div>
    </div>

    <script>
      const btn = document.getElementById('blooddrop-btn');
      const logo = btn.querySelector('.logo-icon');

      btn.addEventListener('click', function (e) {

        if (e.button !== 0 || e.ctrlKey || e.metaKey || e.shiftKey) return;

        e.preventDefault();

        logo.style.transition = 'transform 0.5s ease-in-out';
        logo.style.transform = 'scale(1.15) rotate(360deg)';

        setTimeout(function () {
          // Reset inline styles so CSS rules take back over
          logo.style.transition = '';
          logo.style.transform = '';
          window.open(btn.href, '_blank', 'noopener,noreferrer');
        }, 520);
      });
    </script>

  </body>
