<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thank You - LifeDrop</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="css/thank-you.css">
    </head>

    <body>

        <nav>
            <div class="nav-logo">
                <img src="image/logo-red.png" alt="LifeDrop logo">
                <h1>LifeDrop</h1>
            </div>

            <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>

            <ul class="nav-links-ul">
                <li><a href="index.html">Home</a></li>
                <li><a href="benefits.html">Benefits</a></li>
                <li><a href="donate.html">Donate</a></li>
                <li><a href="locations.html">Locations</a></li>
            </ul>

            <a href="donate.html" class="nav-btn-a">Become a Donor</a>
        </nav>

        <main class="thankyou-wrapper">
        <section class="thankyou-banner">
            <h3>Thank You </h3>
            <h5>For becoming a hope for a fading life.</h5>
        </section>
        <p class="thankyou-note">
        🔔 Please note that our team will contact you after finding suitable match.
        </p>
    </main>
        <!--<main class="thank-you-main">
            <section class="thank-you-section">
                <h1>Thank You</h1>
                <small>for your willingness to donate blood</small>
                <p>Our team will reach out to you when there is a need in your area.</p>
            </section>
        </main>-->

        <script>
            // Hamburger menu toggle
            const toggle = document.querySelector('.nav-toggle');
            const navLinks = document.querySelector('.nav-links-ul');
            toggle.addEventListener('click', () => {
                const open = toggle.getAttribute('aria-expanded') === 'true';
                toggle.setAttribute('aria-expanded', String(!open));
                navLinks.classList.toggle('nav-open');
            });
            // Close menu when a link is clicked
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('nav-open');
                    toggle.setAttribute('aria-expanded', 'false');
                });
            });
        </script>

    </body>

</html>
